<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOS 2 фото</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 900px;
      width: 100%;
      text-align: center;
    }
    .dropzone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .dropzone.dragover {
      border-color: #4f46e5;
      background: #eef2ff;
    }
    input { display:none; }
    .error { color: red; }

    .viewport {
      position: relative;
      width: 442px;        /* 342 + 50*2 */
      height: 541.5px;     /* 441.5 + 50*2 */
      margin: 20px auto;
      background: #000;
    }

    canvas.preview {
      position: absolute;
      top: 0;
      left: 0;
      cursor: grab;
    }

    .overlay {
      position: absolute;
      left: 50px;
      top: 50px;
      width: 342px;
      height: 441.5px;
      border: 1px solid red;
      pointer-events: none;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    #download {
      background-color: green;
      height: 90px;
    }
    
    #replace {
      background-color: grey;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Подготовка фото для MOS 2</h1>
  <div id="dropstep">
      <div class="dropzone" id="dropzone">Перетащи сюда фото или нажми и выбери</div>
      <input type="file" id="input" accept="image/*" />
      <div class="error" id="error"></div>
      <div id="bmc" style="margin-top: 20px; display: none">
        <a target="_blank" href="https://justandrei.github.io/coffee" style="text-decoration: none">
            <img src="https://justandrei.github.io/jdg-tools/checklist/bmc.svg">
        </a>
      </div>
  </div>

  <div id="cropstep" style="display: none;">
    <div>Двигай и растягивай или сжимай, чтобы фотография совпала с рамкой</div>
    <div class="viewport" id="viewport">
      <canvas id="canvas" class="preview"></canvas>
      <div class="overlay"></div>
    </div>
    <div style="display: flex; justify-content: space-evenly">
      <div>
        <div>Подстрой точно</div>
        <div>
          <button id="zoomIn">🔍</button>
          <button id="moveUp">⬆️</button>
          <button id="zoomOut">🔎</button>
        </div>
        <div>
          <button id="moveLeft">⬅️</button>
          <button id="moveDown">⬇️</button>
          <button id="moveRight">➡️</button>
        </div>
      </div>
      <div>
        <div>Сохрани</div>
        <div>
          <button id="download">Готово!</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
<script>
const input = document.getElementById('input');
const dropstep = document.getElementById('dropstep');
const cropstep = document.getElementById('cropstep');
const dropzone = document.getElementById('dropzone');
const error = document.getElementById('error');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const viewport = document.getElementById('viewport');
const downloadBtn = document.getElementById('download');
const bmc = document.getElementById('bmc');

let imgData;
let pos = { x: 0, y: 0 };
let scale = 1;
let dragging = false;
let last = { x: 0, y: 0 };

const TARGET_W = 684;
const TARGET_H = 883;
const VIEW_W = 342;
const VIEW_H = 441.5;
const MARGIN = 50;
const CANVAS_W = VIEW_W + MARGIN * 2;  // 442
const CANVAS_H = VIEW_H + MARGIN * 2;  // 541.5

function handleFile(file) {
  if (!file) return;
  error.textContent = '';

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => fixOrientation(img, file);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function fixOrientation(img, file) {
  EXIF.getData(file, function() {
    const o = EXIF.getTag(this, 'Orientation');
    const c = document.createElement('canvas');
    const cx = c.getContext('2d');

    let w = img.width, h = img.height;

    if ([5,6,7,8].includes(o)) {
      c.width = h; c.height = w;
    } else {
      c.width = w; c.height = h;
    }

    switch(o) {
      case 6: cx.rotate(Math.PI/2); cx.drawImage(img, 0, -h); break;
      case 3: cx.rotate(Math.PI); cx.drawImage(img, -w, -h); break;
      case 8: cx.rotate(-Math.PI/2); cx.drawImage(img, -w, 0); break;
      default: cx.drawImage(img,0,0);
    }

    const fixed = new Image();
    fixed.onload = () => initEditor(fixed);
    fixed.src = c.toDataURL('image/jpeg');
  });
}

function initEditor(img) {
  if (img.width < TARGET_W || img.height < TARGET_H) {
    error.textContent = 'Минимум 684×883';
    return;
  }

  dropstep.style.display = 'none';
  cropstep.style.display = 'block';

  const scaleX = VIEW_W / img.width;
  const scaleY = VIEW_H / img.height;
  scale = Math.max(scaleX, scaleY);

  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  imgData = img;

  // center within the frame area (offset by MARGIN)
  pos.x = MARGIN + (VIEW_W - img.width * scale) / 2;
  pos.y = MARGIN + (VIEW_H - img.height * scale) / 2;

  draw();
}

function clamp() {
  const scaledW = imgData.width * scale;
  const scaledH = imgData.height * scale;

  if (scaledW <= VIEW_W) {
    pos.x = MARGIN + (VIEW_W - scaledW) / 2;
  } else {
    pos.x = Math.min(MARGIN, Math.max(MARGIN + VIEW_W - scaledW, pos.x));
  }

  if (scaledH <= VIEW_H) {
    pos.y = MARGIN + (VIEW_H - scaledH) / 2;
  } else {
    pos.y = Math.min(MARGIN, Math.max(MARGIN + VIEW_H - scaledH, pos.y));
  }
}

function draw() {
  clamp();
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // draw full image
  ctx.setTransform(scale, 0, 0, scale, pos.x, pos.y);
  ctx.drawImage(imgData, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  // dim the margin strips
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0,            0,             CANVAS_W,  MARGIN);           // top
  ctx.fillRect(0,            MARGIN + VIEW_H, CANVAS_W, MARGIN);          // bottom
  ctx.fillRect(0,            MARGIN,        MARGIN,    VIEW_H);           // left
  ctx.fillRect(MARGIN + VIEW_W, MARGIN,     MARGIN,    VIEW_H);           // right
}

function applyZoom(newScale, anchorX, anchorY) {
  const minScale = Math.max(VIEW_W / imgData.width, VIEW_H / imgData.height);
  newScale = Math.max(newScale, minScale);
  pos.x = anchorX - (anchorX - pos.x) * (newScale / scale);
  pos.y = anchorY - (anchorY - pos.y) * (newScale / scale);
  scale = newScale;
  draw();
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  last = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - last.x;
  const dy = e.clientY - last.y;
  pos.x += dx;
  pos.y += dy;
  last = { x: e.clientX, y: e.clientY };
  draw();
});

window.addEventListener('mouseup', () => dragging = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const anchorX = e.clientX - rect.left;
  const anchorY = e.clientY - rect.top;
  applyZoom(scale * (e.deltaY < 0 ? 1.05 : 0.95), anchorX, anchorY);
}, { passive: false });

// touch
let lastTouchDist = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true;
    last = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    dragging = false;
    lastTouchDist = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
  }
}, { passive: false });  // ← required for preventDefault to work on Android

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const t = e.touches[0];
    const dx = t.clientX - last.x;
    const dy = t.clientY - last.y;
    pos.x += dx;
    pos.y += dy;
    last = { x: t.clientX, y: t.clientY };
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
    if (lastTouchDist !== null) {
      const rect = canvas.getBoundingClientRect();
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      applyZoom(scale * (dist / lastTouchDist), midX, midY);
    }
    lastTouchDist = dist;
  }
}, { passive: false });  // ← required

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastTouchDist = null;
  if (e.touches.length === 0) dragging = false;
});

// export

downloadBtn.onclick = () => {
  const out = document.createElement('canvas');
  out.width = TARGET_W;
  out.height = TARGET_H;
  const octx = out.getContext('2d');

  const scaleRatio = TARGET_W / VIEW_W; // same as TARGET_H / VIEW_H

  octx.setTransform(
    scale * scaleRatio, 0, 0,
    scale * scaleRatio,
    (pos.x - MARGIN) * scaleRatio,
    (pos.y - MARGIN) * scaleRatio
  );

  octx.drawImage(imgData, 0, 0);

  out.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'result.jpg';
    a.click();
  }, 'image/jpeg', 0.92);

  dropstep.style.display = 'block';
  cropstep.style.display = 'none';
  bmc.style.display = 'block';
};

// DnD

dropzone.onclick = () => input.click();

dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));

dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

input.addEventListener('change', e => handleFile(e.target.files[0]));

// Fine-tune buttons
const NUDGE = 1; // px
const ZOOM_STEP = 1.005;

document.getElementById('moveUp').addEventListener('click',    () => { pos.y -= NUDGE; draw(); });
document.getElementById('moveDown').addEventListener('click',  () => { pos.y += NUDGE; draw(); });
document.getElementById('moveLeft').addEventListener('click',  () => { pos.x -= NUDGE; draw(); });
document.getElementById('moveRight').addEventListener('click', () => { pos.x += NUDGE; draw(); });
document.getElementById('zoomIn').addEventListener('click',  () => applyZoom(scale * ZOOM_STEP, MARGIN + VIEW_W / 2, MARGIN + VIEW_H / 2));
document.getElementById('zoomOut').addEventListener('click', () => applyZoom(scale / ZOOM_STEP, MARGIN + VIEW_W / 2, MARGIN + VIEW_H / 2));
</script>
</body>
</html>
